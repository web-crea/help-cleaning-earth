<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean the Earth</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* 页面 */
.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

/* 首页 */
#home {
  background: black;
  color: white;
}

/* 地球 */
.earth {
  width: 200px;
  transition: 0.5s;
}

.gray {
  filter: grayscale(100%);
}

.color {
  filter: none;
}

/* 按钮 */
button {
  padding: 12px 25px;
  margin-top: 20px;
  border-radius: 25px;
  border: none;
  background: green;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* 任务页 */
#tasks {
  background: #e8f5e9;
}

.task {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 15px;
  width: 80%;
  text-align: center;
  font-size: 18px;
  cursor: pointer;
}

.done {
  background: #a5d6a7;
  text-decoration: line-through;
}

/* 🏆 徽章 */
.badge {
  font-size: 40px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- 🌍 首页 -->
<div id="home" class="page active">
  < img src="images/earth.jpg" id="earth" class="earth gray">
  <h1>Help Clean the Earth</h1>

  <h2 id="streakText">🔥 0 days</h2>
  <div id="badge" class="badge"></div>

  <button onclick="showPage('tasks')">Start →</button>
</div>

<!-- ✔ 任务页 -->
<div id="tasks" class="page">
  <h2>Did You Help Today?</h2>

  <div class="task" onclick="toggleTask(0)">♻️ Recycle</div>
  <div class="task" onclick="toggleTask(1)">🧴 Pick up bottles</div>
  <div class="task" onclick="toggleTask(2)">🛍️ Clean plastic bags</div>
  <div class="task" onclick="toggleTask(3)">Ride or walk to school</div>
  <div class="task" onclick="toggleTask(4)">Use water bottle then plastic bottles</div>
  <button onclick="showPage('home')">← Back</button>
</div>

<script>
/* 页面切换 */
function showPage(pageId){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });
  document.getElementById(pageId).classList.add("active");
}

/* 数据 */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [false,false,false];
let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastCheck = localStorage.getItem("lastCheck");

/* 日期 */
function getToday(){
  return new Date().toDateString();
}

function getYesterday(){
  let d = new Date();
  d.setDate(d.getDate()-1);
  return d.toDateString();
}

/* 切换任务 */
function toggleTask(index){
  tasks[index] = !tasks[index];
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

/* 🎯 完成检测 */
function checkCompletion(){
  const today = getToday();

  if(tasks.every(t=>t)){
    if(lastCheck === getYesterday()){
      streak += 1;
    } else if(lastCheck !== today){
      streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastCheck", today);
  }
}

/* 🎨 渲染 */
function render(){
  const taskDivs = document.querySelectorAll(".task");

  taskDivs.forEach((el,i)=>{
    if(tasks[i]){
      el.classList.add("done");
      el.innerHTML = "✔ " + el.innerText.replace("✔ ","");
    }else{
      el.classList.remove("done");
      el.innerHTML = el.innerText.replace("✔ ","");
    }
  });

  checkCompletion();
  updateEarth();
  updateStreakUI();
}

/* 🌍 地球 */
function updateEarth(){
  const earth = document.getElementById("earth");

  if(tasks.every(t=>t)){
    earth.classList.remove("gray");
    earth.classList.add("color");
  } else {
    earth.classList.add("gray");
    earth.classList.remove("color");
  }
}

/* 🔥 连续天数 + 🏆 徽章 */
function updateStreakUI(){
  document.getElementById("streakText").innerText = "🔥 " + streak + " days";

  const badge = document.getElementById("badge");

  if(streak >= 30){
    badge.innerText = "🥇 Gold";
  } else if(streak >= 10){
    badge.innerText = "🥈 Silver";
  } else if(streak >= 7){
    badge.innerText = "🥉 Bronze";
  } else {
    badge.innerText = "";
  }
}

/* 初始化 */
render();
</script>

</body>
</html>
